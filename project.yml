name: Xyzterminal
options:
  bundleIdPrefix: com.xyzterminal
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    branch: main
targets:
  Xyzterminal:
    type: application
    platform: macOS
    sources:
      - path: Xyzterminal
    dependencies:
      - package: SwiftTerm
    settings:
      base:
        INFOPLIST_FILE: Xyzterminal/Info.plist
        CODE_SIGN_ENTITLEMENTS: Xyzterminal/Xyzterminal.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.xyzterminal.app
        CODE_SIGN_IDENTITY: "-"
        ENABLE_APP_SANDBOX: false
        ENABLE_HARDENED_RUNTIME: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
