name: Pluricode
options:
  bundleIdPrefix: com.pluricode
  deploymentTarget:
    macOS: "15.0"
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5"
packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    branch: main
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
targets:
  Pluricode:
    type: application
    platform: macOS
    sources:
      - path: Pluricode
      - path: PluriShared
    dependencies:
      - package: SwiftTerm
      - package: Sparkle
    settings:
      base:
        INFOPLIST_FILE: Pluricode/Info.plist
        CODE_SIGN_ENTITLEMENTS: Pluricode/Pluricode.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.pluricode.app
        CODE_SIGN_IDENTITY: "-"
        ENABLE_APP_SANDBOX: false
        ENABLE_HARDENED_RUNTIME: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MACOSX_DEPLOYMENT_TARGET: "15.0"
  PluricodeMobile:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PluriShared
      - path: PluricodeMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pluricode.mobile
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "Pluricode connects to your Mac over your private network to drive Pluri."
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: "88PCU22989"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
